worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ───────────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_time":"$upstream_response_time",'
    '"user_agent":"$http_user_agent"'
    '}';
  access_log /var/log/nginx/access.log json_combined;

  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  75;
  keepalive_requests 1000;

  # ── Upload size (100 MB audio + headroom) ─────────────────────
  client_max_body_size 110m;
  client_body_timeout  120s;

  # ── Compression ───────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   4;
  gzip_types
    text/plain text/css application/json application/javascript
    text/xml application/xml text/javascript;

  # ── Security headers ──────────────────────────────────────────
  add_header X-Frame-Options          "SAMEORIGIN"    always;
  add_header X-Content-Type-Options   "nosniff"       always;
  add_header X-XSS-Protection         "1; mode=block" always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
  server_tokens off;

  # ── Rate limiting zones ───────────────────────────────────────
  # General API: 60 requests/minute per IP
  limit_req_zone $binary_remote_addr zone=api_general:10m  rate=60r/m;
  # Auth endpoints: 10 req/min (brute-force protection)
  limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=10r/m;
  # Job start: 5 req/min per IP (prevent job spam)
  limit_req_zone $binary_remote_addr zone=api_jobs:10m     rate=5r/m;
  # Upload presign: 10 req/min
  limit_req_zone $binary_remote_addr zone=api_upload:10m   rate=10r/m;
  # SSE streams: 20 concurrent connections per IP
  limit_conn_zone $binary_remote_addr zone=sse_conns:10m;

  limit_req_status  429;
  limit_conn_status 429;

  # ── Upstreams ─────────────────────────────────────────────────
  upstream frontend {
    server frontend:3000;
    keepalive 32;
  }

  upstream backend {
    server backend:4000;
    keepalive 64;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────────
  server {
    listen 80;
    server_name mashfusion.ai www.mashfusion.ai api.mashfusion.ai;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS main server ─────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name mashfusion.ai www.mashfusion.ai;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Auth endpoints (strict rate limit) ────────────────────
    location ~ ^/auth/ {
      limit_req  zone=api_auth  burst=5  nodelay;
      proxy_pass http://backend;
      include    /etc/nginx/proxy_params.conf;
    }

    # ── Job start (prevent abuse) ──────────────────────────────
    location = /jobs/start-remix {
      limit_req  zone=api_jobs  burst=2  nodelay;
      proxy_pass http://backend;
      include    /etc/nginx/proxy_params.conf;
      proxy_read_timeout 30s;
    }

    # ── SSE real-time stream ───────────────────────────────────
    location ~ ^/jobs/[^/]+/stream$ {
      limit_conn  sse_conns  20;
      proxy_pass  http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        '';
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 3600s;        # 1 h — long-lived SSE connection
      chunked_transfer_encoding on;
    }

    # ── Upload presign ────────────────────────────────────────
    location ~ ^/tracks/presign {
      limit_req  zone=api_upload  burst=5  nodelay;
      proxy_pass http://backend;
      include    /etc/nginx/proxy_params.conf;
    }

    # ── Stripe webhooks — no rate limit (Stripe IPs only) ─────
    location = /stripe/webhook {
      proxy_pass http://backend;
      include    /etc/nginx/proxy_params.conf;
      # Raw body required for Stripe signature verification
      proxy_request_buffering on;
    }

    # ── General API ───────────────────────────────────────────
    location ~ ^/(tracks|jobs|user|projects|internal)/ {
      limit_req  zone=api_general  burst=20  nodelay;
      proxy_pass http://backend;
      include    /etc/nginx/proxy_params.conf;
    }

    # ── Health check (unrestricted) ───────────────────────────
    location = /health {
      proxy_pass http://backend/health;
      access_log off;
    }

    # ── Next.js frontend ──────────────────────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host       $host;
      proxy_cache_bypass          $http_upgrade;
      proxy_read_timeout          60s;

      # Static asset long cache
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        proxy_pass http://frontend;
        expires    365d;
        add_header Cache-Control "public, immutable";
      }
    }
  }

  # ── API subdomain ─────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.mashfusion.ai;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=63072000" always;

    location ~ ^/jobs/[^/]+/stream$ {
      limit_conn  sse_conns  20;
      proxy_pass  http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      chunked_transfer_encoding on;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/auth/ {
      limit_req  zone=api_auth  burst=5  nodelay;
      proxy_pass http://backend;
      include    /etc/nginx/proxy_params.conf;
    }

    location / {
      limit_req  zone=api_general  burst=30  nodelay;
      proxy_pass http://backend;
      include    /etc/nginx/proxy_params.conf;
    }
  }
}
