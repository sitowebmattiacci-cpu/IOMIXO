version: '3.9'

# ════════════════════════════════════════════════════════════════
#  MASHFUSION AI — PRODUCTION DOCKER COMPOSE
#  Separated worker pools: GPU (stem separation) / CPU (all other)
#  Celery Beat: periodic cleanup + credit reset
#  Flower: queue monitoring
#  Usage:
#    docker compose -f docker-compose.production.yml up -d
#    Scale CPU workers: docker compose -f docker-compose.production.yml up -d --scale celery-cpu-worker=3
# ════════════════════════════════════════════════════════════════

x-supabase-env: &supabase-env
  SUPABASE_URL:              ${SUPABASE_URL}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

x-db-env: &db-env
  DATABASE_URL: ${DATABASE_URL}

x-redis-env: &redis-env
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

x-ai-base-env: &ai-base-env
  <<: [*redis-env, *supabase-env]
  BACKEND_URL:             http://backend:4000
  INTERNAL_API_KEY:        ${AI_ENGINE_API_KEY}
  MODELS_DIR:              /models
  TMP_DIR:                 /tmp/mashfusion
  DEMUCS_MODEL:            ${DEMUCS_MODEL:-htdemucs_6s}
  CELERY_BROKER_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
  CELERY_RESULT_URL:       redis://:${REDIS_PASSWORD}@redis:6379/1
  AWS_ACCESS_KEY_ID:       ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY:   ${AWS_SECRET_ACCESS_KEY}
  AWS_S3_BUCKET:           ${AWS_S3_BUCKET}
  AWS_S3_REGION:           ${AWS_S3_REGION:-us-east-1}

services:
  # ──────────────────────────────────────────────────────────────
  # Redis — Broker (DB0) · Results (DB1) · SSE pub/sub (DB2)
  #         Rate-limit (DB3) · Checkpoints live in DB0 as keys
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAX_MEMORY:-2gb}
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2.5g

  # ──────────────────────────────────────────────────────────────
  # Backend API — Node.js / Express
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: mashfusion/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      <<: [*db-env, *supabase-env]
      NODE_ENV:                production
      PORT:                    4000
      REDIS_URL:               redis://:${REDIS_PASSWORD}@redis:6379
      AI_ENGINE_URL:           http://ai-engine:8001
      AI_ENGINE_API_KEY:       ${AI_ENGINE_API_KEY}
      JWT_SECRET:              ${JWT_SECRET}
      STRIPE_SECRET_KEY:       ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRO_PRICE_ID:     ${STRIPE_PRO_PRICE_ID}
      STRIPE_STUDIO_PRICE_ID:  ${STRIPE_STUDIO_PRICE_ID}
      SMTP_HOST:               ${SMTP_HOST}
      SMTP_PORT:               ${SMTP_PORT:-587}
      SMTP_USER:               ${SMTP_USER}
      SMTP_PASS:               ${SMTP_PASS}
      FROM_EMAIL:              ${FROM_EMAIL:-noreply@mashfusion.ai}
      ALLOWED_ORIGINS:         ${ALLOWED_ORIGINS}
      NEXT_PUBLIC_APP_URL:     ${NEXT_PUBLIC_APP_URL}
      AWS_ACCESS_KEY_ID:       ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY:   ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET:           ${AWS_S3_BUCKET}
      AWS_S3_REGION:           ${AWS_S3_REGION:-us-east-1}
      LOG_LEVEL:               ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ──────────────────────────────────────────────────────────────
  # FastAPI AI Engine — receives job dispatch from backend
  # ──────────────────────────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    image: mashfusion/ai-engine:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '8001:8001'
    environment:
      <<: *ai-base-env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ai_models:/models
      - ai_tmp:/tmp/mashfusion
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8001/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g

  # ──────────────────────────────────────────────────────────────
  # GPU Worker — stem separation ONLY (Demucs htdemucs_6s)
  # Requires: NVIDIA runtime + GPU reservation
  # Concurrency = 1 (one job fully utilizes GPU)
  # Queue: gpu_heavy
  # ──────────────────────────────────────────────────────────────
  celery-gpu-worker:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile.gpu
    image: mashfusion/ai-engine-gpu:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: >
      celery -A workers.celery_worker worker
      --loglevel=info
      --concurrency=1
      --prefetch-multiplier=1
      -Q gpu_heavy
      -n gpu-worker@%h
      --max-tasks-per-child=10
    environment:
      <<: *ai-base-env
      WORKER_TYPE:       gpu
      WORKER_CONCURRENCY: 1
      CUDA_VISIBLE_DEVICES: "0"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ai_models:/models
      - ai_tmp:/tmp/mashfusion
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 16g
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  # ──────────────────────────────────────────────────────────────
  # CPU Worker — analysis, composition, style, mastering, rendering
  # No GPU. Scale horizontally for throughput.
  # Queues: cpu_standard, rendering
  # ──────────────────────────────────────────────────────────────
  celery-cpu-worker:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    image: mashfusion/ai-engine:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: >
      celery -A workers.celery_worker worker
      --loglevel=info
      --concurrency=${CPU_WORKER_CONCURRENCY:-4}
      --prefetch-multiplier=1
      -Q cpu_standard,rendering
      -n cpu-worker@%h
      --max-tasks-per-child=50
    environment:
      <<: *ai-base-env
      WORKER_TYPE:        cpu
      WORKER_CONCURRENCY: ${CPU_WORKER_CONCURRENCY:-4}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ai_models:/models
      - ai_tmp:/tmp/mashfusion
    deploy:
      replicas: ${CPU_WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: '4.0'
          memory: 8g
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5

  # ──────────────────────────────────────────────────────────────
  # Cleanup Worker — temp file deletion + S3 expiry sweeps
  # Lightweight, high concurrency for I/O operations
  # Queue: cleanup
  # ──────────────────────────────────────────────────────────────
  celery-cleanup-worker:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    image: mashfusion/ai-engine:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: >
      celery -A workers.celery_worker worker
      --loglevel=info
      --concurrency=8
      --prefetch-multiplier=4
      -Q cleanup,notifications
      -n cleanup-worker@%h
      --max-tasks-per-child=200
    environment:
      <<: *ai-base-env
      WORKER_TYPE: cleanup
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ai_tmp:/tmp/mashfusion
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256m

  # ──────────────────────────────────────────────────────────────
  # Celery Beat — periodic task scheduler
  # Runs: cleanup sweeps, S3 expiry, worker heartbeats
  # MUST BE EXACTLY ONE REPLICA — never scale this service
  # ──────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    image: mashfusion/ai-engine:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: >
      celery -A workers.celery_worker beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *ai-base-env
      WORKER_TYPE: beat
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 1           # STRICT: exactly 1 beat process
      resources:
        limits:
          cpus: '0.25'
          memory: 128m

  # ──────────────────────────────────────────────────────────────
  # Flower — Celery queue monitoring dashboard
  # Access: http://localhost:5555
  # ──────────────────────────────────────────────────────────────
  flower:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    image: mashfusion/ai-engine:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: >
      celery -A workers.celery_worker flower
      --port=5555
      --broker=redis://:${REDIS_PASSWORD}@redis:6379/0
      --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
      --url-prefix=flower
    ports:
      - '5555:5555'
    environment:
      <<: *ai-base-env
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256m

  # ──────────────────────────────────────────────────────────────
  # Frontend — Next.js standalone build
  # ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    image: mashfusion/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV:                           production
      PORT:                               3000
      NEXT_PUBLIC_API_URL:                ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SUPABASE_URL:           ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY:      ${SUPABASE_ANON_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_STRIPE_PRO_PRICE_ID:    ${STRIPE_PRO_PRICE_ID}
      NEXT_PUBLIC_STRIPE_STUDIO_PRICE_ID: ${STRIPE_STUDIO_PRICE_ID}
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m

  # ──────────────────────────────────────────────────────────────
  # Nginx — TLS termination + reverse proxy + rate limiting
  # ──────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.production.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128m

volumes:
  redis_data:
    driver: local
  ai_models:
    driver: local
  ai_tmp:
    driver: local
  nginx_logs:
    driver: local

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
