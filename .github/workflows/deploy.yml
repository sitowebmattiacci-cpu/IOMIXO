name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  # ──────────────────────────────────────────────────────────────
  # Build + push Docker images to GHCR
  # ──────────────────────────────────────────────────────────────
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: backend
            context: mashfusion-ai/backend
          - name: frontend
            context: mashfusion-ai/frontend
          - name: ai-engine
            context: mashfusion-ai/ai-engine

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mashfusion-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/mashfusion-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # Deploy to production server via SSH
  # (Requires secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    needs: build-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ~/mashfusion-ai

            # Pull latest images
            docker compose pull

            # Rolling restart (zero-downtime where possible)
            docker compose up -d --remove-orphans

            # Remove dangling images
            docker image prune -f

            echo "Deploy complete: $(date -u)"
