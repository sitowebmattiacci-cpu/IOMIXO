name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Backend — TypeScript + lint
  # ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mashfusion-ai/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mashfusion-ai/backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts --max-warnings 0
        continue-on-error: true   # lint warnings don't fail CI, only errors

  # ──────────────────────────────────────────────────────────────
  # Frontend — TypeScript + Next.js build
  # ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mashfusion-ai/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mashfusion-ai/frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_STRIPE_PRO_PRICE_ID: price_placeholder
          NEXT_PUBLIC_STRIPE_STUDIO_PRICE_ID: price_placeholder
        run: npm run build

  # ──────────────────────────────────────────────────────────────
  # AI Engine — Python syntax + imports
  # ──────────────────────────────────────────────────────────────
  ai-engine:
    name: AI Engine (lint + syntax)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mashfusion-ai/ai-engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff (fast Python linter)
        run: pip install ruff

      - name: Lint
        run: ruff check . --select E,F,W --ignore E501

  # ──────────────────────────────────────────────────────────────
  # Docker — validate compose file (no actual build in CI)
  # ──────────────────────────────────────────────────────────────
  docker-validate:
    name: Docker Compose validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        working-directory: mashfusion-ai
        run: docker compose config --quiet
        env:
          # Provide placeholder values so compose config doesn't fail on missing vars
          JWT_SECRET: ci_placeholder
          AWS_ACCESS_KEY_ID: ci_placeholder
          AWS_SECRET_ACCESS_KEY: ci_placeholder
          AWS_S3_BUCKET: ci_placeholder
          AI_ENGINE_API_KEY: ci_placeholder
          STRIPE_SECRET_KEY: ci_placeholder
          STRIPE_WEBHOOK_SECRET: ci_placeholder
          STRIPE_PRO_PRICE_ID: ci_placeholder
          STRIPE_STUDIO_PRICE_ID: ci_placeholder
          SMTP_HOST: ci_placeholder
          SMTP_USER: ci_placeholder
          SMTP_PASS: ci_placeholder
          SMTP_FROM: ci@example.com

  # ──────────────────────────────────────────────────────────────
  # Backend — Jest unit tests
  # ──────────────────────────────────────────────────────────────
  backend-tests:
    name: Backend tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mashfusion-ai/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mashfusion-ai/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_ENV: test
          # All other secrets are stubbed in src/__tests__/setup.ts
        run: npm test -- --ci --forceExit

  # ──────────────────────────────────────────────────────────────
  # AI Engine — pytest unit tests (lightweight, no GPU required)
  # ──────────────────────────────────────────────────────────────
  ai-engine-tests:
    name: AI Engine tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mashfusion-ai/ai-engine

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies only
        # Only install packages needed for the pure-Python unit tests
        # (no Demucs/librosa/torch — those are GPU-optional and slow to install)
        run: pip install pytest pytest-cov

      - name: Run adapter unit tests
        run: pytest tests/test_remix_director_adapter.py -v --tb=short
