<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IOMIXO</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      text-align: center;
      padding: 2rem;
    }

    header h1 {
      font-size: 4rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff6ec7, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      color: #aaa;
      letter-spacing: 0.1em;
    }

    main {
      margin-top: 3rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem;
      width: 220px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #a78bfa;
    }

    .card .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>

  <header>
    <h1>IOMIXO</h1>
    <p>Il tuo spazio creativo</p>
  </header>

  <main>
    <a class="card" href="http://localhost:3000/studio/new">
      <div class="icon">🎵</div>
      <h2>Musica</h2>
    </a>
    <a class="card" href="http://localhost:3000/projects">
      <div class="icon">📋</div>
      <h2>Progetti</h2>
    </a>
    <a class="card" href="http://localhost:3000/dashboard">
      <div class="icon">📅</div>
      <h2>Dashboard</h2>
    </a>
    <a class="card" href="http://localhost:3000/billing">
      <div class="icon">⚙️</div>
      <h2>Impostazioni</h2>
    </a>
  </main>

  <footer>
    <p>IOMIXO &copy; 2026</p>
  </footer>

</body>
</html>
